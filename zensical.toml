[project.theme]
variant = "modern"
# custom_dir = "/overrides" # BUG Has not gotten to work!
# favicon = "https://em-content.zobj.net/thumbs/120/microsoft/319/blue-book_1f4d8.png" # assets/favicon.png
# [project.theme.icon]
# logo = "logo"
features = [
  # "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  # "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "header.autohide",
  "navigation.expand",
  # "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  # "navigation.prune",
  "navigation.sections", # Makes tabs permanent or allows for drop-down menus!
  "navigation.tabs",
  # "navigation.tabs.sticky",
  "navigation.top", # Toggle back to top icon
  "navigation.tracking",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow"
  # "toc.integrate" # Integrate table of contents in the sidebar
]
palette = [
  { media = "(prefers-color-scheme)", toggle = { icon = "material/link", name = "Switch to light mode" } },
  { media = "(prefers-color-scheme: light)", scheme = "default", primary = "indigo", accent = "indigo", toggle = { icon = "material/toggle-switch", name = "Switch to dark mode" } },
  { media = "(prefers-color-scheme: dark)", scheme = "slate", primary = "black", accent = "indigo", toggle = { icon = "material/toggle-switch-off", name = "Switch to system preference" } }
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[project.extra]
generator = false # Hides footer with "Made with Zensical"

[project.extra.status]
new = "Recently added"
deprecated = "Deprecated"
draft = "Draft"
working = "Working"
production = "Production-ready"

[project.theme.icon]
repo = "fontawesome/brands/git-alt"